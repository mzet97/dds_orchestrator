// Orchestrator ↔ Agent gRPC service
// Mirrors the DDS topics: agent/request, agent/response, agent/status

syntax = "proto3";
package orchestrator_grpc;

message ChatMessage {
    string role    = 1;
    string content = 2;
}

message AgentTaskRequest {
    string              task_id         = 1;
    string              requester_id    = 2;
    string              task_type       = 3;
    repeated ChatMessage messages       = 4;
    int32               priority        = 5;
    int32               timeout_ms      = 6;
    bool                requires_context = 7;
    bool                stream          = 8;
    int32               max_tokens      = 9;
    float               temperature     = 10;
    int32               urgency         = 11;
    int32               complexity      = 12;
}

message AgentTaskResponse {
    string task_id            = 1;
    string agent_id           = 2;
    string content            = 3;
    bool   is_final           = 4;
    int32  prompt_tokens      = 5;
    int32  completion_tokens  = 6;
    int32  processing_time_ms = 7;
    bool   success            = 8;
    string error_message      = 9;
}

message HeartbeatRequest {
    string agent_id       = 1;
    string state          = 2;  // idle, busy, error
    int32  current_slots  = 3;
    int32  memory_usage_mb = 4;
}

message HeartbeatResponse {
    bool   acknowledged = 1;
    string message      = 2;
}

message Empty {}

// ─── Client-facing messages ─────────────────────────────────────────────────

message ClientChatRequest {
    string               request_id   = 1;
    string               model        = 2;
    repeated ChatMessage messages     = 3;
    float                temperature  = 4;
    int32                max_tokens   = 5;
    bool                 stream       = 6;
    int32                priority     = 7;
    int32                timeout_ms   = 8;
}

message ClientChatResponse {
    string request_id         = 1;
    string content            = 2;
    bool   is_final           = 3;
    int32  prompt_tokens      = 4;
    int32  completion_tokens  = 5;
    int32  processing_time_ms = 6;
    bool   success            = 7;
    string error_message      = 8;
    string model              = 9;
}

// ─── Services ───────────────────────────────────────────────────────────────

// Agent ↔ Orchestrator (internal)
service OrchestratorAgentService {
    // Unary task submission
    rpc SubmitTask(AgentTaskRequest) returns (AgentTaskResponse);

    // Server-streaming task submission
    rpc StreamTask(AgentTaskRequest) returns (stream AgentTaskResponse);

    // Heartbeat
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

// Client ↔ Orchestrator (external)
service ClientOrchestratorService {
    // Unary chat completion
    rpc Chat(ClientChatRequest) returns (ClientChatResponse);

    // Server-streaming chat completion (token-by-token)
    rpc StreamChat(ClientChatRequest) returns (stream ClientChatResponse);
}
