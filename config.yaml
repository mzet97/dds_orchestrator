# DDS-LLM Orchestrator Configuration

# Server settings
host: "0.0.0.0"
port: 8080

# DDS settings
dds_domain: 0
dds_enabled: true

# Agent settings
max_agents: 1000
# Offline threshold: agent evicted if no heartbeat (HTTP or DDS agent/status)
# arrives within this window. Matches dissertation v3 (30s); with the 5s
# heartbeat period, the HUB tolerates up to 6 consecutive missed heartbeats.
agent_timeout_seconds: 30

# Task settings
max_concurrent_tasks: 2000
task_timeout_seconds: 120

# Logging
log_level: "INFO"

# Model defaults
default_model: "Qwen3.5-2B"
default_max_tokens: 256
default_temperature: 0.7
